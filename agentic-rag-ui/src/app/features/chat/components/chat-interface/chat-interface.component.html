<div class="chat-interface">
  <!-- Alert -->
  <div class="alert alert-danger m-3" *ngIf="error$ | async as error">
    <i class="bi bi-exclamation-triangle me-2"></i>
    {{ error }}
  </div>

  <!-- Messages Container -->
  <div class="messages-container" #messagesContainer>
    <div class="empty-state" *ngIf="(messages$ | async)?.length === 0">
      <i class="bi bi-chat-dots display-1 text-muted mb-3"></i>
      <h4>Commencez une conversation</h4>
      <p class="text-muted">Posez une question sur vos documents uploadés</p>
    </div>

    <div class="messages-list" *ngIf="(messages$ | async)?.length ?? 0 > 0">
      <app-message-item
        *ngFor="let message of messages$ | async; trackBy: trackByMessageId"
        [message]="message"
        [isStreaming]="isStreaming && message.status === 'streaming'">
      </app-message-item>
    </div>
  </div>

  <!-- Input fixe en bas -->
  <div class="chat-input-area">
    <app-message-input
      [inputText]="inputText"
      [isStreaming]="isStreaming"
      (send)="onSendMessage($event)"
      (cancel)="onCancelStream()"
      (inputChange)="onInputChange($event)">
    </app-message-input>
  </div>
</div>
