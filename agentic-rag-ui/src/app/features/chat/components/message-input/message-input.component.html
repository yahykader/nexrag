<div class="message-input-container">
  
  <!-- Streaming indicator -->
  <div class="streaming-indicator" *ngIf="isStreaming">
    <div class="spinner-border spinner-border-sm me-2"></div>
    <span>Assistant en train d'écrire...</span>
    <button 
      class="btn btn-sm btn-outline-danger ms-auto"
      (click)="onCancel()">
      <i class="bi bi-stop-circle me-1"></i>
      Arrêter
    </button>
  </div>
  
  <!-- Input area -->
  <div class="input-wrapper">
    
    <textarea
      class="form-control message-textarea"
      placeholder="Posez votre question..."
      [(ngModel)]="inputText"
      (ngModelChange)="onInputChange($event)"
      (keydown)="onKeyDown($event)"
      [disabled]="disabled || isStreaming"
      rows="1"></textarea>
  
        <!-- Bouton Micro -->
    <app-voice-button
      [language]="'fr'"
      [disabled]="disabled || isStreaming"
      (transcriptFinal)="onTranscript($event)"
      (recordingChange)="onRecordingChange($event)"
      (error)="onVoiceError($event)">
    </app-voice-button>

    <button 
      class="btn btn-primary send-button"
      [disabled]="!inputText.trim() || disabled || isStreaming"
      (click)="onSend()">
      <i class="bi bi-send-fill"></i>
    </button>
    
  </div>
  
  <!-- Hint -->
  <div class="input-hint">
    <small class="text-muted">
      <i class="bi bi-info-circle me-1"></i>
      Appuyez sur Ctrl+Entrée pour envoyer
    </small>
  </div>
  
</div>
