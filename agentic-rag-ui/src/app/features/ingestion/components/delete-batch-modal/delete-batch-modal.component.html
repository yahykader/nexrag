
    <div class="modal fade" 
         [id]="modalId"
         tabindex="-1" 
         data-bs-backdrop="static">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-warning">
          
          <!-- Header -->
          <div class="modal-header bg-warning text-dark">
            <h5 class="modal-title">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              Confirmer la Suppression
            </h5>
            <button 
              type="button" 
              class="btn-close" 
              (click)="cancel()"
              [disabled]="isDeleting">
            </button>
          </div>
          
          <!-- Body -->
          <div class="modal-body">
            <div *ngIf="!isDeleting" class="text-center">
              <i class="bi bi-trash3 text-danger" style="font-size: 3rem;"></i>
              
              <h5 class="mt-3 mb-3">
                {{ isDuplicate ? 'Supprimer ce doublon ?' : 'Supprimer ce fichier ?' }}
              </h5>
              
              <div class="alert alert-warning mb-3">
                <p class="mb-2">
                  <strong>Fichier :</strong><br>
                  <code>{{ filename }}</code>
                </p>
                <p class="mb-0">
                  <strong>Batch ID :</strong><br>
                  <code class="small">{{ batchId }}</code>
                </p>
              </div>
              
              <p class="text-muted mb-0">
                Cette action supprimera définitivement ce fichier du système.
              </p>
            </div>
            
            <div *ngIf="isDeleting" class="text-center py-4">
              <div class="spinner-border text-danger mb-3"></div>
              <h5>Suppression en cours...</h5>
              <p class="text-muted mb-0">Veuillez patienter</p>
            </div>
          </div>
          
          <!-- Footer -->
          <div class="modal-footer" *ngIf="!isDeleting">
            <button 
              type="button" 
              class="btn btn-secondary"
              (click)="cancel()">
              <i class="bi bi-x-lg me-2"></i>
              Annuler
            </button>
            
            <button 
              type="button" 
              class="btn btn-danger"
              (click)="confirm()">
              <i class="bi bi-trash3 me-2"></i>
              Supprimer
            </button>
          </div>
          
        </div>
      </div>
    </div>
