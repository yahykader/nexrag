<!-- progress-panel.component.html -->
<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <h5 class="mb-0">
      <i class="bi bi-activity me-2"></i>
      Progression en Temps Réel
    </h5>
    
    <!-- WebSocket Status -->
    <span 
      class="badge"
      [class.bg-success]="wsConnected$ | async"
      [class.bg-danger]="!(wsConnected$ | async)">
      <i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i>
      {{ (wsConnected$ | async) ? 'Connecté' : 'Déconnecté' }}
    </span>
  </div>
  
  <div class="card-body">
    <!-- ✅ Active Progress (en cours) -->
    <div *ngIf="(activeProgress$ | async)?.length ?? 0 > 0; else noActiveProgress">
      <h6 class="text-muted">En cours</h6>
      <div 
        *ngFor="let progress of activeProgress$ | async" 
        class="progress-item mb-3">
        
        <div class="d-flex justify-content-between mb-2">
          <span class="fw-bold">{{ progress.filename }}</span>
          <span class="badge bg-primary">{{ progress.stage }}</span>
        </div>
        
        <div class="progress mb-1" style="height: 20px;">
          <div 
            class="progress-bar progress-bar-striped progress-bar-animated"
            [style.width.%]="progress.progressPercentage"
            role="progressbar">
            {{ progress.progressPercentage }}%
          </div>
        </div>
        
        <small class="text-muted">{{ progress.message }}</small>
      </div>
    </div>
    
    <!-- ✅ NOUVEAU: Recently Completed (fade out) -->
    <div *ngIf="(recentlyCompleted$ | async)?.length ?? 0 > 0" class="mt-4">
      <h6 class="text-muted">Terminés récemment</h6>
      <div 
        *ngFor="let progress of recentlyCompleted$ | async" 
        class="progress-item-completed mb-2 fade-out">
        
        <div class="d-flex justify-content-between align-items-center">
          <span class="small">
            <i 
              [class]="progress.stage === 'COMPLETED' ? 'bi bi-check-circle-fill text-success' : 'bi bi-x-circle-fill text-danger'"
              class="me-2"></i>
            {{ progress.filename }}
          </span>
          <span class="badge" 
                [class.bg-success]="progress.stage === 'COMPLETED'"
                [class.bg-danger]="progress.stage === 'ERROR'">
            {{ progress.stage }}
          </span>
        </div>
      </div>
    </div>
    
    <ng-template #noActiveProgress>
      <div class="text-center text-muted py-4">
        <i class="bi bi-hourglass-split display-4"></i>
        <p class="mt-2">Aucun upload en cours</p>
      </div>
    </ng-template>
  </div>
</div>
