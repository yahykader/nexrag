# ============================================================================
# AlertManager Configuration - RAG System
# ============================================================================
# Gestion des alertes Prometheus avec routing intelligent
# ============================================================================

global:
  resolve_timeout: 5m
  
  # Configuration SMTP (Email) - Décommenter pour activer
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'your-email@gmail.com'
  # smtp_auth_password: 'your-app-password'
  # smtp_require_tls: true

  # Configuration Slack - Décommenter pour activer
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# ============================================================================
# ROUTES - Routing des alertes
# ============================================================================
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'
  
  routes:
    # Alertes CRITIQUES - notification immédiate
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 5m
    
    # Alertes WARNING - groupées
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 1h
    
    # Alertes INGESTION - RAG spécifique
    - match:
        component: ingestion
      receiver: 'ingestion-alerts'
      group_wait: 1m
      repeat_interval: 2h
    
    # Alertes API - Vision AI, Embedding, Tika, LibreOffice
    - match:
        component: api
      receiver: 'api-alerts'
      group_wait: 30s
      repeat_interval: 30m
    
    # Alertes VECTOR STORE - PgVector
    - match:
        component: vectorstore
      receiver: 'vectorstore-alerts'
      group_wait: 1m
      repeat_interval: 1h

# ============================================================================
# INHIBIT RULES - Suppression alertes redondantes
# ============================================================================
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# ============================================================================
