# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  agentic_rag_chatbot_data:
    driver: local
  redis_data:
    driver: local
  clamav_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  agentic-chatbot-net:
    driver: bridge