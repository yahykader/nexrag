spring:
  application:
    name: nexrag-integration-tests
  datasource:
    # Surchargé par @DynamicPropertySource dans AbstractIntegrationSpec
    url: jdbc:postgresql://localhost:5432/nexrag_test
    username: testuser
    password: testpass
    driver-class-name: org.postgresql.Driver
    # Connection pool settings to prevent connection timeout issues
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQL10Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate.jdbc.batch_size: 20
      hibernate.order_inserts: true
  redis:
    # Surchargé par @DynamicPropertySource dans AbstractIntegrationSpec
    host: localhost
    port: 6379
    password: ""
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  # Disable unnecessary autoconfiguration for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.observation.ObservationAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.tracing.TracingAutoConfiguration

antivirus:
  enabled: true
  # Surchargé par @DynamicPropertySource dans AbstractIntegrationSpec
  host: localhost
  port: 3310
  timeout: 30000

openai:
  # Surchargé par @DynamicPropertySource dans AbstractIntegrationSpec
  base-url: http://localhost:8080
  chat:
    api-url: http://localhost:8080/v1/chat/completions
    model: gpt-4o
    temperature: 0.7
    max-tokens: 2000
  embeddings:
    model: text-embedding-3-small
    dimension: 1536

# Retrieval configuration for integration tests
retrieval:
  query-transformer:
    enabled: false  # Disable query transformation in tests to avoid LLM calls

  # Optimize retrievers for test speed (lower limits than production)
  retrievers:
    parallel-timeout: 15000  # Increased for Testcontainers pgvector latency (10s typical)
    text:
      enabled: true
      top-k: 5        # Reduced from 20 for test speed
      similarity-threshold: 0.7
    image:
      enabled: false  # Disable image retrieval in tests (adds latency, not critical for pipeline test)
      top-k: 2        # Reduced from 5
      similarity-threshold: 0.6
    bm25:
      enabled: true
      top-k: 3        # Reduced from 10
      language: french

  # Optimize aggregator for test speed
  aggregator:
    fusion-method: rrf
    rrf-k: 60
    text-weight: 0.5
    image-weight: 0.3
    bm25-weight: 0.2
    max-candidates: 10  # Reduced from 30
    final-top-k: 3      # Reduced from 10

  # Optimize reranker for test speed
  reranker:
    enabled: true
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    top-k: 3        # Reduced from 10
    batch-size: 8   # Reduced from 32

server:
  port: 0  # Utiliser un port aléatoire pour @SpringBootTest(webEnvironment = RANDOM_PORT)

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  health:
    # Disable liveness/readiness probes that might fail during startup
    livenessState:
      enabled: false
    readinessState:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true

# Disable rate limiting in tests (not critical for testing other features)
rate-limit:
  upload:
    requests-per-minute: 10000  # Effectively disabled for tests
  batch:
    requests-per-minute: 10000
  delete:
    requests-per-minute: 10000
  search:
    requests-per-minute: 10000
  default-endpoint:
    requests-per-minute: 10000

logging:
  level:
    root: WARN
    com.exemple.nexrag: INFO
    org.springframework: WARN
    org.springframework.boot.test: INFO
    org.testcontainers: INFO
    io.github.resilience4j.core.utils: WARN
