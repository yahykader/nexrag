# Propriétés minimales pour les tests @WebMvcTest
openai.api.key=test-key
openai.whisper.model=whisper-1
openai.whisper.timeout-seconds=30
openai.whisper.default-extension=.webm
openai.whisper.min-audio-bytes=100

document.xlsx.libreoffice.timeout-seconds=60
document.xlsx.pdf.generated-pdf-dir=/tmp/test-pdfs

antivirus.enabled=false
antivirus.health-check.enabled=false