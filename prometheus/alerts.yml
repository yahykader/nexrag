groups:
  # ========================================================================
  # PERFORMANCE ALERTS
  # ========================================================================
  - name: performance
    interval: 30s
    rules:
      - alert: HighQueryLatency
        expr: histogram_quantile(0.95, rate(rag_query_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: query
        annotations:
          summary: "High query latency detected"
          description: "95th percentile query latency is {{ $value }}s (threshold: 5s)"
      
      - alert: VeryHighQueryLatency
        expr: histogram_quantile(0.95, rate(rag_query_duration_seconds_bucket[5m])) > 10
        for: 2m
        labels:
          severity: critical
          component: query
        annotations:
          summary: "Very high query latency detected"
          description: "95th percentile query latency is {{ $value }}s (threshold: 10s)"
      
      - alert: SlowTTFT
        expr: histogram_quantile(0.95, rate(rag_generation_ttft_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          component: generation
        annotations:
          summary: "Slow Time To First Token"
          description: "95th percentile TTFT is {{ $value }}s (threshold: 1s)"
      - alert: QueryTransformationSlow
        expr: histogram_quantile(0.95, rate(rag_query_transformation_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Query transformation is slow (P95 > 2s)"

      - alert: RetrievalSlow
        expr: histogram_quantile(0.95, rate(rag_retrieval_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Retrieval is slow (P95 > 1s)"

      - alert: GenerationSlow
        expr: histogram_quantile(0.95, rate(rag_generation_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Generation is slow (P95 > 5s)"

      - alert: HighConversationTokens
        expr: rate(rag_conversation_tokens_total[5m]) * 60 > 1000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High conversation token rate (>1000 tokens/min)"

      - alert: HighLLMCostRate
        expr: rate(rag_cost_llm_total_usd[5m]) * 3600 > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Coût LLM élevé (>$10/heure)"
          description: "Le coût LLM est actuellement de {{ $value | printf \"%.2f\" }}$/heure"

      - alert: DailyBudgetExceeded
        expr: sum(increase(rag_cost_llm_total_usd[24h])) > 100
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Budget quotidien dépassé ($100)"
          description: "Coût des dernières 24h: {{ $value | printf \"%.2f\" }}$"

      - alert: AbnormalTokenRatio
        expr: |
          sum(increase(rag_cost_input_tokens_total[1h])) 
          / sum(increase(rag_cost_output_tokens_total[1h])) > 10
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Ratio input/output anormalement élevé"
          description: "Ratio actuel: {{ $value | printf \"%.2f\" }}"
          
  # ========================================================================
  # ERROR RATE ALERTS
  # ========================================================================
  - name: errors
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(rag_queries_error_total[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
          component: query
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
      
      - alert: CriticalErrorRate
        expr: rate(rag_queries_error_total[5m]) > 0.20
        for: 1m
        labels:
          severity: critical
          component: query
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 20%)"

  # ========================================================================
  # RESOURCE ALERTS
  # ========================================================================
  - name: resources
    interval: 30s
    rules:
      - alert: HighConcurrentConnections
        expr: rag_connections_active > 900
        for: 2m
        labels:
          severity: warning
          component: connections
        annotations:
          summary: "High number of concurrent connections"
          description: "{{ $value }} active connections (threshold: 900, max: 1000)"
      
      - alert: LowCacheHitRate
        expr: rag_cache_hit_rate < 0.40
        for: 10m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }} (threshold: 40%)"

  # ========================================================================
  # QUALITY ALERTS
  # ========================================================================
  - name: quality
    interval: 30s
    rules:
      - alert: HighEmptyResultRate
        expr: rate(rag_quality_empty_results_total[10m]) / rate(rag_queries_total[10m]) > 0.10
        for: 5m
        labels:
          severity: warning
          component: retrieval
        annotations:
          summary: "High empty result rate"
          description: "{{ $value | humanizePercentage }} of queries return no results (threshold: 10%)"
      
      - alert: LowAverageRelevance
        expr: rag_quality_avg_relevance < 0.70
        for: 10m
        labels:
          severity: warning
          component: retrieval
        annotations:
          summary: "Low average relevance score"
          description: "Average relevance is {{ $value }} (threshold: 0.70)"

  # ========================================================================
  # COST ALERTS
  # ========================================================================
  - name: costs
    interval: 1h
    rules:
      - alert: HighDailyCost
        expr: increase(rag_cost_llm_total_usd_total[24h]) > 100
        for: 1h
        labels:
          severity: warning
          component: llm
        annotations:
          summary: "High daily LLM cost"
          description: "Daily cost is ${{ $value }} (threshold: $100)"
      
      - alert: CriticalDailyCost
        expr: increase(rag_cost_llm_total_usd_total[24h]) > 500
        for: 30m
        labels:
          severity: critical
          component: llm
        annotations:
          summary: "Critical daily LLM cost"
          description: "Daily cost is ${{ $value }} (threshold: $500)"

  # ========================================================================
  # SYSTEM HEALTH ALERTS
  # ========================================================================
  - name: health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="rag-assistant"} == 0
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "RAG Assistant service is down"
          description: "Service {{ $labels.instance }} has been down for more than 1 minute"
      
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / process_virtual_memory_max_bytes) > 0.90
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"